openapi: 3.0.3
info:
  title: EffectiveMobile API
  version: 1.0.0
  description: Task CRUD API.

servers:
  - url: /

paths:
  /api/tasks:
    get:
      tags: [Tasks]
      summary: List active tasks
      description: Returns only active tasks (status=true).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      tags: [Tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpsertRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Tasks]
      summary: Get task
      description: Returns 404 if the task is inactive.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not Found
    put:
      tags: [Tasks]
      summary: Update task
      description: Full update (all fields must be provided).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpsertRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not Found
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Tasks]
      summary: Delete task
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

components:
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
            required: [message, errors]

  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: boolean
      required: [id, title, description, status]

    TaskUpsertRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: boolean
      required: [title, status]

